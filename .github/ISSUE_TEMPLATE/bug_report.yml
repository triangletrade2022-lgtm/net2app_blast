name: 🐛 Bug Report
description: Report a reproducible bug to help us improve
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: What happened that shouldn't have happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
      placeholder: It should have done X instead
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Errors
      description: |
        Relevant log output from PM2, SMPP gateway, or SMSC monitor.
        Tip: You can attach log files by clicking this area and dragging them in.
      placeholder: Paste logs or error messages here
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recordings
      description: If applicable, add screenshots or recordings to help explain the problem
      placeholder: Drag and drop images here

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      options:
        - SMPP Gateway (smpp_server.py)
        - Web Dashboard / API
        - SMSC Monitor Script
        - Installer / Deployment
        - Database / Schema
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: What version or commit are you running?
      placeholder: v1.0.0 or git commit hash
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Environment
      description: Which OS and deployment method?
      placeholder: Ubuntu 24.04 LTS / one-line installer
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Run `node -v` to check
      placeholder: v22.22.3

  - type: input
    id: db
    attributes:
      label: PostgreSQL Version
      description: Run `psql --version` to check
      placeholder: psql (PostgreSQL) 16.x

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      description: Before submitting, please confirm
      options:
        - label: I have searched the [existing issues](https://github.com/triangletrade2022-lgtm/net2app_blast/issues) for this bug
          required: true
        - label: I have checked the [FAQ](https://github.com/triangletrade2022-lgtm/net2app_blast/blob/master/SUPPORT.md) and documentation
          required: true
        - label: I have included relevant logs and environment details
          required: true
