name: ✨ Feature Request
description: Suggest an idea for this project
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please describe the problem you're
        trying to solve and how this feature would help.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe it clearly.
      placeholder: I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented
      placeholder: A new endpoint at /api/... that allows [...]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives have you considered?
      placeholder: I've tried using [X] but it didn't work because [...]

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which area would this feature impact?
      options:
        - SMPP Gateway (smpp_server.py)
        - Web Dashboard / API
        - SMSC Monitor Script
        - Installer / Deployment
        - Database / Schema
        - Documentation
        - New component
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice-to-have
        - Important — blocking my workflow
        - Critical — cannot use the platform without it
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request here
      placeholder: Links to similar features in other projects, screenshots, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched the [existing issues](https://github.com/triangletrade2022-lgtm/net2app_blast/issues) for this feature
          required: true
        - label: I have described the problem clearly and proposed a specific solution
          required: true
