<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Signal bars -->
  <rect x="10" y="42" width="6" height="14" rx="1.5" fill="url(#accent)" opacity="0.5"/>
  <rect x="20" y="36" width="6" height="20" rx="1.5" fill="url(#accent)" opacity="0.65"/>
  <rect x="30" y="28" width="6" height="28" rx="1.5" fill="url(#accent)" opacity="0.8"/>
  <rect x="40" y="20" width="6" height="36" rx="1.5" fill="url(#accent)"/>
  <!-- Message bubble -->
  <circle cx="52" cy="20" r="4" fill="#22c55e"/>
</svg>
